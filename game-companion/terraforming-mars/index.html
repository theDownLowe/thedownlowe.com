<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#080b14" />
  <title>Terraforming Mars — Game Companion</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
</head>
<body>

  <!-- Main game screen -->
  <div id="main-game" class="main-game">

    <header class="game-header">
      <a href="../" class="back-link-small">← Companions</a>
      <span class="game-title">Terraforming Mars</span>
      <button id="fullscreen-btn" class="btn-ghost btn-icon" aria-label="Enter fullscreen"></button>
      <button id="new-game-btn" class="btn-ghost">↺ New</button>
    </header>

    <!--
      .game-layout:
        Portrait  → column: [stats-panel] then [resources-grid]
        Landscape → row:    [stats-panel | resources-grid]
    -->
    <div class="game-layout">

      <!-- Stats: Generation, TR, End Generation -->
      <div class="stats-panel">
        <div class="stat-card gen-card">
          <span class="stat-label">Generation</span>
          <div class="stat-controls">
            <button class="stat-btn" onclick="adjustGeneration(-1)">−</button>
            <span id="gen-value" class="stat-value">1</span>
            <button class="stat-btn" onclick="adjustGeneration(1)">+</button>
          </div>
        </div>

        <div class="stat-card tr-card">
          <span class="stat-label">TR</span>
          <div class="stat-controls">
            <button class="stat-btn" onclick="adjustTR(-1)">−</button>
            <span id="tr-value" class="stat-value tr-accent">20</span>
            <button class="stat-btn" onclick="adjustTR(1)">+</button>
          </div>
        </div>

        <button id="end-gen-btn" class="end-gen-btn">End Generation</button>
      </div>

      <!-- Resources: MC → Steel → Titanium → Plants → Energy → Heat -->
      <div id="resources-grid" class="resources-grid"></div>

    </div>
  </div>

  <!-- iOS "Add to Home Screen" nudge (shown once, only on iOS) -->
  <div id="ios-hint" class="ios-hint hidden">
    <span class="ios-hint-text">
      For fullscreen: tap
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      then <strong>Add to Home Screen</strong>
    </span>
    <button id="ios-hint-close" class="ios-hint-close" aria-label="Dismiss">✕</button>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
