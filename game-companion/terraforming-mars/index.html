<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#080b14" />
  <title>Terraforming Mars — Game Companion</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
</head>
<body>

  <!-- Setup overlay (shown when no active game) -->
  <div id="setup-overlay" class="setup-overlay">
    <div class="setup-panel">
      <a href="../" class="back-link">← Game Companion</a>
      <div class="setup-hero">
        <span class="setup-icon">🚀</span>
        <h1 class="setup-title">Terraforming Mars</h1>
        <p class="setup-subtitle">Enter your name to begin tracking</p>
      </div>
      <div class="setup-field">
        <label class="setup-label" for="player-name">Your Name <span class="optional">(optional)</span></label>
        <input
          id="player-name"
          class="setup-input"
          type="text"
          placeholder="e.g. Taylor"
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
        />
      </div>
      <button id="start-game-btn" class="start-btn">Start Game 🚀</button>
    </div>
  </div>

  <!-- Main game screen -->
  <div id="main-game" class="main-game hidden">

    <header class="game-header">
      <a href="../" class="back-link-small">← Companions</a>
      <span class="game-title">Terraforming Mars</span>
      <button id="new-game-btn" class="btn-ghost" aria-label="New game">↺ New</button>
    </header>

    <div class="game-body">

      <!-- TR + Generation row -->
      <div class="top-row">
        <div class="gen-card">
          <span class="stat-label">Generation</span>
          <div class="stat-controls">
            <button class="stat-btn" onclick="adjustGeneration(-1)">−</button>
            <span id="gen-value" class="stat-value">1</span>
            <button class="stat-btn" onclick="adjustGeneration(1)">+</button>
          </div>
        </div>
        <div class="tr-card">
          <span class="stat-label">TR</span>
          <div class="stat-controls">
            <button class="stat-btn" onclick="adjustTR(-1)">−</button>
            <span id="tr-value" class="stat-value tr-accent">20</span>
            <button class="stat-btn" onclick="adjustTR(1)">+</button>
          </div>
        </div>
      </div>

      <!-- Resources grid -->
      <div id="resources-grid" class="resources-grid"></div>

    </div>

    <!-- Sticky bottom action bar -->
    <div class="bottom-bar">
      <button id="end-gen-btn" class="end-gen-btn">End Generation</button>
    </div>

  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
