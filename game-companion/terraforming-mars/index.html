<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#080b14" />
  <title>Terraforming Mars — Game Companion</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
</head>
<body>

  <!-- Setup overlay (shown when no active game) -->
  <div id="setup-overlay" class="setup-overlay">
    <div class="setup-panel">
      <a href="../" class="back-link">← Game Companion</a>
      <div class="setup-hero">
        <span class="setup-icon">🚀</span>
        <h1 class="setup-title">Terraforming Mars</h1>
        <p class="setup-subtitle">Set up your game to begin tracking</p>
      </div>

      <div class="setup-section">
        <label class="setup-label">Number of Players</label>
        <div class="player-count-group">
          <button class="player-count-btn" data-count="1">1</button>
          <button class="player-count-btn active" data-count="2">2</button>
          <button class="player-count-btn" data-count="3">3</button>
          <button class="player-count-btn" data-count="4">4</button>
          <button class="player-count-btn" data-count="5">5</button>
        </div>
      </div>

      <div class="setup-section">
        <label class="setup-label">Player Names</label>
        <div id="player-inputs"></div>
      </div>

      <button id="start-game-btn" class="start-btn">Launch Game 🚀</button>
    </div>
  </div>

  <!-- Main game screen -->
  <div id="main-game" class="hidden">
    <header class="game-header">
      <div class="header-left">
        <a href="../" class="back-link-small">← Companions</a>
        <span class="game-title">Terraforming Mars</span>
      </div>
      <div class="header-center">
        <span id="generation-display" class="generation-display">Generation 1</span>
      </div>
      <div class="header-right">
        <button id="end-gen-btn" class="btn-primary">End Gen</button>
        <button id="new-game-btn" class="btn-secondary">New Game</button>
      </div>
    </header>

    <div class="game-body">
      <!-- Global Parameters -->
      <section class="params-section">
        <h2 class="section-heading">Global Parameters</h2>
        <div id="params-container" class="params-container"></div>
      </section>

      <!-- Players -->
      <section class="players-section">
        <h2 class="section-heading">Players</h2>
        <div id="players-container" class="players-container"></div>
      </section>
    </div>
  </div>

  <!-- End generation toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
