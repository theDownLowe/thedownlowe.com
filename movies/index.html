<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laylee's Movie Lounge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth modal -->
  <div class="auth-overlay" id="authModal">
    <div class="auth-modal">
      <h2 id="authModalTitle">Sign in</h2>
      <div class="auth-warning" id="authWarning">
        ⚠️ Don't use a password you use anywhere else — passwords are stored in plain text.
      </div>
      <input type="text" id="authUsername" placeholder="Username" maxlength="20" autocomplete="off" spellcheck="false" />
      <input type="password" id="authPassword" placeholder="Password" autocomplete="off" />
      <div class="auth-error" id="authError"></div>
      <button class="auth-submit" id="authSubmitBtn" onclick="submitAuth()">Sign in</button>
      <p class="auth-toggle" id="toggleToRegister">
        No account? <a href="#" onclick="setAuthMode('register'); return false;">Sign up</a>
      </p>
      <p class="auth-toggle" id="toggleToLogin" style="display:none">
        Already have an account? <a href="#" onclick="setAuthMode('login'); return false;">Sign in</a>
      </p>
    </div>
  </div>

  <div class="app">

    <header class="header">
      <div class="header-top">
        <div>
          <div class="logo">Laylee's <span>Movie</span> Lounge</div>
        </div>
        <button class="auth-btn" id="authBtn" onclick="auth ? logout() : openAuthModal()">Sign in</button>
      </div>
    </header>

    <div class="suggest-section" id="suggestSection">
      <div class="suggest-bar">
        <div class="search-wrap">
          <input type="text" id="movieInput" placeholder="Search for a movie..." maxlength="80" autocomplete="off" />
          <div class="dropdown" id="dropdown"></div>
        </div>
        <button id="addBtn" onclick="addMovie()">+ Add</button>
      </div>
      <div class="preview" id="preview"></div>
      <div class="locked-msg">Sign in to suggest and vote on movies</div>
    </div>

    <div class="tab-row">
      <button class="tab active" onclick="setSort('score', this)">Top rated</button>
      <button class="tab" onclick="setSort('new', this)">Newest</button>
    </div>

    <div class="sort-label" id="sortLabel">sorted by score</div>
    <div class="movie-list" id="movieList">
      <div class="loading">Loading movies...</div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
