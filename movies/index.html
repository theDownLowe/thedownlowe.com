<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laylee's Lounge Movie Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <p class="logo">Laylee's Lounge Movie Picker</p>
    </header>

    <div class="suggest-section">
      <div class="suggest-bar">
        <div class="search-wrap">
          <input type="text" id="movieInput" placeholder="Search for a movie..." maxlength="80" autocomplete="off" />
          <div class="dropdown" id="dropdown"></div>
        </div>
        <input type="text" id="nameInput" placeholder="Your name (optional)" maxlength="30" />
        <button id="addBtn" onclick="addMovie()">+ Add</button>
      </div>
      <div class="preview" id="preview"></div>
    </div>

    <div class="tab-row">
      <button class="tab active" onclick="setSort('score', this)">Top rated</button>
      <button class="tab" onclick="setSort('new', this)">Newest</button>
    </div>

    <div class="sort-label" id="sortLabel">sorted by score</div>
    <div class="movie-list" id="movieList">
      <div class="loading">Loading movies...</div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
